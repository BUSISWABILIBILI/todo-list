<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Project</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="app-shell" aria-labelledby="app-title">
        <aside class="left-panel">
        <header class="app-header">
          <p class="eyebrow">Simple task tracker</p>
          <h1 id="app-title">Todo Project</h1>
            <p class="app-intro">
              Plan the day, keep active work visible, and clear finished tasks
              when you are ready.
            </p>
        </header>

          <div class="status-panel">
            <p class="status-label">Current workload</p>
            <p class="todo-count" id="todo-count">0 active tasks</p>
          </div>

          <div class="todo-filters" id="todo-filters" aria-label="Todo filters">
            <button class="filter-button is-active" type="button" data-filter="all">
              All
            </button>
            <button class="filter-button" type="button" data-filter="active">
              Active
            </button>
            <button class="filter-button" type="button" data-filter="completed">
              Completed
            </button>
          </div>
        </aside>

        <section class="right-panel" aria-label="Task workspace">
        <form class="todo-form" id="todo-form">
          <label for="todo-input">New task</label>
          <div class="todo-entry">
            <input
              id="todo-input"
              name="todo"
              type="text"
              placeholder="Add a task"
              autocomplete="off"
            />
            <button type="submit">Add</button>
          </div>
        </form>

        <ul class="todo-list" id="todo-list" aria-label="Todo list"></ul>
        <p class="empty-state" id="empty-state" hidden>No tasks yet.</p>

        <footer class="todo-footer">
          <button class="clear-button" id="clear-completed" type="button">
            Clear completed
          </button>
        </footer>
        </section>
      </section>
    </main>

    <script type="module" src="/src/script.js"></script>
  </body>
</html>
